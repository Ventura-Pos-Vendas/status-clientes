<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Casos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #2d2d2d;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 700px;
            width: 100%;
        }

        /* Logo GRANDE */
        .logo {
            margin-bottom: 2.5rem;
        }

        .logo img {
            width: 100%;
            max-width: 500px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Texto comum */
        .texto {
            color: #e0e0e0;
            font-size: 1.3rem;
            line-height: 1.6;
            font-weight: 400;
        }

        /* Apenas o link em cor diferente - sem fundo, sem borda */
        .link {
            color: #6bc4ff;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
            color: #8dd4ff;
        }

        /* Apenas o número em cor diferente - sem fundo, sem borda */
        .numero {
            color: #25D366;
            text-decoration: none;
            cursor: pointer;
        }

        .numero:hover {
            text-decoration: underline;
            color: #34e07d;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo GRANDE -->
        <div class="logo">
            <img src="https://raw.githubusercontent.com/Ventura-Pos-Vendas/teste-status-clientes/main/assets/logo.png" alt="Ventura Marine Logo">

        <div class="texto">

            <br>Para obter as informações de acesso entrar em contato com<br>

        </div>
    </div>
</body>
</html>
